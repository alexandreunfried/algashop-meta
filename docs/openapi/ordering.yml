openapi: 3.1.0

info:
  title: AlgaShop - Ordering
  version: "1.0"

servers:
  - description: Development
    url: "http://localhost:8080"
  - description: Production
    url: "https://api.algashop.com"

paths:
  /api/v1/customers:
    post:
      description: Register new customer
      tags:
        - Customers
    get:
      description: List customers
      tags:
        - Customers
  /api/v1/customers{customerId} :
    get:
      parameters:
        - schema:
            type: string
          name: customerId
          in: path
          required: true
          example: '019ee5cf-89f9-7443-a73c-af889ce1c083'
      description: Get one customer by id
      tags:
        - Customers
    put:
      parameters:
        - schema:
            type: string
          name: customerId
          in: path
          required: true
          example: '019ee5cf-89f9-7443-a73c-af889ce1c083'
      description: Edit customer
      tags:
        - Customers
    delete:
      parameters:
        - schema:
            type: string
          name: customerId
          in: path
          required: true
          example: '019ee5cf-89f9-7443-a73c-af889ce1c083'
      description: Delete customer
      tags:
        - Customers